name: refund_radar
description: Refund Radar — AI agent for tracking & maximizing refunds (Flutter + Firebase).
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: 1.0.9

  firebase_core: 3.15.2
  firebase_auth: 5.7.0
  cloud_firestore: 5.6.12
  firebase_analytics: 11.6.0
  firebase_crashlytics: 4.3.10
  firebase_remote_config: 5.5.0
  firebase_messaging: 15.2.10
  onesignal_flutter: 5.6.3

  flutter_riverpod: 2.6.1
  go_router: 14.8.1
  purchases_flutter: 8.11.0

  flutter_local_notifications: 19.5.0
  timezone: 0.10.1
  flutter_timezone: ^4.1.0
  url_launcher: 6.3.2
  google_fonts: 6.3.3
  http: 1.6.0
  path_provider: 2.1.6
  shared_preferences: 2.5.5
  permission_handler: 11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0
  integration_test:
    sdk: flutter
  # Test-only: deterministic non-Firebase unit tests for repositories +
  # parser/generator/services. mocktail avoids the build_runner dependency
  # of mockito; we don't want to gate Phase 2 on a codegen roundtrip.
  mocktail: 1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/rules_engine.json
    - assets/templates/
    - assets/templates/upi/
    - assets/templates/fastag/
    - assets/templates/bank_charges/
    - assets/templates/wrong_transfer/
    - assets/templates/advanced/
