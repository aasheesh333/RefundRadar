name: Build Debug APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# Private repo free tier = 1 concurrent job. Queue runs instead of racing
# (which caused GitHub to send a shutdown signal mid-build, cancelling the
# release AAB/APK). cancel-in-progress:false lets a running release finish.
concurrency:
  group: android-build
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Debug build — works with placeholder Firebase / placeholder RevenueCat.
  # Every push/PR runs this. Uses NO secrets.
  # ---------------------------------------------------------------------------
  debug:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_type == 'debug' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # google-services Gradle plugin is always applied (Crashlytics native).
      # Prefer the real secret when present; otherwise write a minimal
      # placeholder so processDebugGoogleServices doesn't fail the build.
      - name: Inject google-services.json (debug)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          DEST=android/app/google-services.json
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > "$DEST"
            echo "Injected real google-services.json ($(wc -c < "$DEST") bytes)"
          else
            # Minimal placeholder — package_name must match applicationId.
            python3 -c 'import json; json.dump({"project_info":{"project_number":"1234567890","project_id":"refund-radar","storage_bucket":"refund-radar.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:1234567890:android:abcdef123456","android_client_info":{"package_name":"com.dhanuk.refundradar"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyD-EXAMPLE"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}, open("android/app/google-services.json","w")); print("Wrote placeholder google-services.json")'
          fi
          python3 -c "import json; json.load(open('android/app/google-services.json')); print('google-services.json OK')"

      - name: Verify analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons --split-per-abi

      - name: Cleanup google-services.json
        if: always()
        run: rm -f android/app/google-services.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: refund-radar-debug-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90

      - name: List build output
        run: ls -lh build/app/outputs/flutter-apk/ || true

      - name: Smoke test — APK produced
        run: |
          set -euo pipefail
          APKS=(build/app/outputs/flutter-apk/*.apk)
          count=${#APKS[@]}
          if [ "$count" -lt 1 ]; then
            echo "::error::No APK artifacts found after debug build"
            exit 1
          fi
          for apk in "${APKS[@]}"; do
            size=$(wc -c < "$apk")
            echo "OK: $apk ($size bytes)"
            if [ "$size" -lt 1000000 ]; then
              echo "::error::APK too small (<1MB) — likely a failed/empty build: $apk"
              exit 1
            fi
          done
          echo "Smoke test passed: $count ABI-split APK(s)"

  # ---------------------------------------------------------------------------
  # Release build — needs secrets. Manual dispatch only
  # (workflow_dispatch with build_type=release). Stops if any required
  # secret is missing. Split into two jobs (AAB then APK) so each gets a
  # fresh ~16-min hosted-runner budget — the GitHub free private-tier
  # runner reclaims after ~16 min, which was cancelling a combined build
  # mid-APK even though the AAB had already uploaded successfully.
  # ---------------------------------------------------------------------------
  release-aab:
    name: Release AAB (Play Store)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release' }}
    concurrency:
      group: release-aab
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Verify required secrets are present
        env:
          FB_ANDROID_API_KEY: ${{ secrets.FB_ANDROID_API_KEY }}
          FB_ANDROID_APP_ID: ${{ secrets.FB_ANDROID_APP_ID }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          REVENUECAT_SDK_KEY: ${{ secrets.REVENUECAT_SDK_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          VERSION_CODE: ${{ secrets.VERSION_CODE }}
          VERSION_NAME: ${{ secrets.VERSION_NAME }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=()
          for v in FB_ANDROID_API_KEY FB_ANDROID_APP_ID FB_MESSAGING_SENDER_ID \
                   FB_PROJECT_ID FB_STORAGE_BUCKET \
                   GOOGLE_SERVICES_JSON \
                   REVENUECAT_SDK_KEY \
                   ONESIGNAL_APP_ID ONESIGNAL_API_KEY \
                   VERSION_CODE VERSION_NAME \
                   KEYSTORE_BASE64 KEYSTORE_PASSWORD \
                   KEY_ALIAS KEY_PASSWORD; do
            if [ -z "$(eval echo \"\$$v\")" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Add them in GitHub repo → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Verify analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          echo "google-services.json injected (size: $(wc -c < android/app/google-services.json) bytes)"
          if ! python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" 2>/dev/null; then
            echo "::error::google-services.json is not valid JSON"
            head -c 200 android/app/google-services.json
            exit 1
          fi

      - name: Build release AAB (signed)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          FB_ANDROID_API_KEY: ${{ secrets.FB_ANDROID_API_KEY }}
          FB_ANDROID_APP_ID: ${{ secrets.FB_ANDROID_APP_ID }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          REVENUECAT_SDK_KEY: ${{ secrets.REVENUECAT_SDK_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          VERSION_CODE: ${{ secrets.VERSION_CODE }}
          VERSION_NAME: ${{ secrets.VERSION_NAME }}
        run: |
          mkdir -p build/app/outputs/symbols
          flutter build appbundle --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --build-name="$VERSION_NAME" \
            --build-number="$VERSION_CODE" \
            --dart-define=FB_ANDROID_API_KEY="$FB_ANDROID_API_KEY" \
            --dart-define=FB_ANDROID_APP_ID="$FB_ANDROID_APP_ID" \
            --dart-define=FB_MESSAGING_SENDER_ID="$FB_MESSAGING_SENDER_ID" \
            --dart-define=FB_PROJECT_ID="$FB_PROJECT_ID" \
            --dart-define=FB_STORAGE_BUCKET="$FB_STORAGE_BUCKET" \
            --dart-define=REVENUECAT_SDK_KEY="$REVENUECAT_SDK_KEY" \
            --dart-define=ONESIGNAL_APP_ID="$ONESIGNAL_APP_ID" \
            --dart-define=ONESIGNAL_API_KEY="$ONESIGNAL_API_KEY" \
            --dart-define=VERSION_NAME="$VERSION_NAME" \
            --dart-define=VERSION_CODE="$VERSION_CODE"

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f android/app/keystore.jks
          rm -f android/app/google-services.json

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: refund-radar-release-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 90
          if-no-files-found: error

      - name: Upload obfuscation symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refund-radar-debug-symbols
          path: build/app/outputs/symbols
          retention-days: 90
          if-no-files-found: ignore

      - name: AAB smoke test
        run: |
          set -euo pipefail
          AABS=(build/app/outputs/bundle/release/*.aab)
          if [ ! -f "${AABS[0]}" ]; then
            echo "::error::No AAB artifact found"
            exit 1
          fi
          for aab in "${AABS[@]}"; do
            size=$(wc -c < "$aab")
            echo "OK: $aab ($size bytes)"
            if [ "$size" -lt 1000000 ]; then
              echo "::error::AAB too small (<1MB): $aab"
              exit 1
            fi
          done
          echo "AAB smoke test passed: ${#AABS[@]} AAB(s)"

  release-apk:
    name: Release APK (sideload, best-effort)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: release-aab
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release' && always() }}
    concurrency:
      group: release-apk
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          python3 -c "import json; json.load(open('android/app/google-services.json'))"

      - name: Build release APK (signed)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          FB_ANDROID_API_KEY: ${{ secrets.FB_ANDROID_API_KEY }}
          FB_ANDROID_APP_ID: ${{ secrets.FB_ANDROID_APP_ID }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          REVENUECAT_SDK_KEY: ${{ secrets.REVENUECAT_SDK_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          VERSION_CODE: ${{ secrets.VERSION_CODE }}
          VERSION_NAME: ${{ secrets.VERSION_NAME }}
        run: |
          flutter build apk --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --build-name="$VERSION_NAME" \
            --build-number="$VERSION_CODE" \
            --dart-define=FB_ANDROID_API_KEY="$FB_ANDROID_API_KEY" \
            --dart-define=FB_ANDROID_APP_ID="$FB_ANDROID_APP_ID" \
            --dart-define=FB_MESSAGING_SENDER_ID="$FB_MESSAGING_SENDER_ID" \
            --dart-define=FB_PROJECT_ID="$FB_PROJECT_ID" \
            --dart-define=FB_STORAGE_BUCKET="$FB_STORAGE_BUCKET" \
            --dart-define=REVENUECAT_SDK_KEY="$REVENUECAT_SDK_KEY" \
            --dart-define=ONESIGNAL_APP_ID="$ONESIGNAL_APP_ID" \
            --dart-define=ONESIGNAL_API_KEY="$ONESIGNAL_API_KEY" \
            --dart-define=VERSION_NAME="$VERSION_NAME" \
            --dart-define=VERSION_CODE="$VERSION_CODE"

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f android/app/keystore.jks
          rm -f android/app/google-services.json

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: refund-radar-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: APK smoke test
        run: |
          set -euo pipefail
          APKS=(build/app/outputs/flutter-apk/*.apk)
          if [ ! -f "${APKS[0]}" ]; then
            echo "::error::No APK artifact found"
            exit 1
          fi
          for apk in "${APKS[@]}"; do
            size=$(wc -c < "$apk")
            echo "OK: $apk ($size bytes)"
            if [ "$size" -lt 1000000 ]; then
              echo "::error::APK too small (<1MB): $apk"
              exit 1
            fi
          done
          echo "APK smoke test passed: ${#APKS[@]} APK(s)"
