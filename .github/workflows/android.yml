name: Build Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Private repo free tier = 1 concurrent job. Queue runs instead of racing.
concurrency:
  group: android-build
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Analyze + unit tests on every push/PR/tag (no APK build).
  # Gate: release jobs (AAB/APK) wait for this to pass.
  # ---------------------------------------------------------------------------
  quality:
    name: Analyze + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # ---------------------------------------------------------------------------
  # Release AAB — runs parallel with APK (no dependency).
  # Triggers: tag push 'v*' OR manual workflow_dispatch. Needs secrets.
  # Quality gate must pass before release jobs start.
  # ---------------------------------------------------------------------------
  release-aab:
    name: Release AAB (Play Store)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    concurrency:
      group: release-aab
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Verify required secrets are present
        env:
          FB_ANDROID_API_KEY: ${{ secrets.FB_ANDROID_API_KEY }}
          FB_ANDROID_APP_ID: ${{ secrets.FB_ANDROID_APP_ID }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          REVENUECAT_SDK_KEY: ${{ secrets.REVENUECAT_SDK_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          VERSION_CODE: ${{ secrets.VERSION_CODE }}
          VERSION_NAME: ${{ secrets.VERSION_NAME }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=()
          for v in FB_ANDROID_API_KEY FB_ANDROID_APP_ID FB_MESSAGING_SENDER_ID \
                   FB_PROJECT_ID FB_STORAGE_BUCKET \
                   GOOGLE_SERVICES_JSON \
                   REVENUECAT_SDK_KEY \
                   ONESIGNAL_APP_ID ONESIGNAL_API_KEY \
                   VERSION_CODE VERSION_NAME \
                   KEYSTORE_BASE64 KEYSTORE_PASSWORD \
                   KEY_ALIAS KEY_PASSWORD; do
            if [ -z "$(eval echo \"\$$v\")" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Add them in GitHub repo → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Cache Gradle build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-1
            ~/.gradle/caches/transforms-3
            android/.gradle
            android/app/build
          key: gradle-build-aab-${{ runner.os }}-${{ hashFiles('android/**/build.gradle*', 'android/**/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: |
            gradle-build-aab-${{ runner.os }}-

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          echo "google-services.json injected (size: $(wc -c < android/app/google-services.json) bytes)"
          if ! python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" 2>/dev/null; then
            echo "::error::google-services.json is not valid JSON"
            head -c 200 android/app/google-services.json
            exit 1
          fi

      - name: Build release AAB (signed)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          FB_ANDROID_API_KEY: ${{ secrets.FB_ANDROID_API_KEY }}
          FB_ANDROID_APP_ID: ${{ secrets.FB_ANDROID_APP_ID }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          REVENUECAT_SDK_KEY: ${{ secrets.REVENUECAT_SDK_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          VERSION_CODE: ${{ secrets.VERSION_CODE }}
          VERSION_NAME: ${{ secrets.VERSION_NAME }}
        run: |
          mkdir -p build/app/outputs/symbols
          # Derive build name from git tag (e.g. v1.0.0-beta5 → 1.0.0-beta5)
          # so secrets don't need updating on every release. Fall back to
          # the VERSION_NAME secret for manual dispatch builds.
          TAG_NAME="${GITHUB_REF#refs/tags/v}"
          if [ -n "$TAG_NAME" ] && [[ "$TAG_NAME" == *.* ]]; then
            BUILD_NAME="$TAG_NAME"
          else
            BUILD_NAME="$VERSION_NAME"
          fi
          # Increment VERSION_CODE from secret; if not set, use pubspec.
          BUILD_NUM="${VERSION_CODE:-4}"
          echo "Building: name=$BUILD_NAME, code=$BUILD_NUM"
          flutter build appbundle --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUM" \
            --dart-define=FB_ANDROID_API_KEY="$FB_ANDROID_API_KEY" \
            --dart-define=FB_ANDROID_APP_ID="$FB_ANDROID_APP_ID" \
            --dart-define=FB_MESSAGING_SENDER_ID="$FB_MESSAGING_SENDER_ID" \
            --dart-define=FB_PROJECT_ID="$FB_PROJECT_ID" \
            --dart-define=FB_STORAGE_BUCKET="$FB_STORAGE_BUCKET" \
            --dart-define=REVENUECAT_SDK_KEY="$REVENUECAT_SDK_KEY" \
            --dart-define=ONESIGNAL_APP_ID="$ONESIGNAL_APP_ID" \
            --dart-define=ONESIGNAL_API_KEY="$ONESIGNAL_API_KEY" \
            --dart-define=VERSION_NAME="$VERSION_NAME" \
            --dart-define=VERSION_CODE="$VERSION_CODE"

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f android/app/keystore.jks
          rm -f android/app/google-services.json

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: refund-radar-release-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 90
          if-no-files-found: error

      - name: Upload obfuscation symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refund-radar-debug-symbols
          path: build/app/outputs/symbols
          retention-days: 90
          if-no-files-found: ignore

      - name: AAB smoke test
        run: |
          set -euo pipefail
          AABS=(build/app/outputs/bundle/release/*.aab)
          if [ ! -f "${AABS[0]}" ]; then
            echo "::error::No AAB artifact found"
            exit 1
          fi
          for aab in "${AABS[@]}"; do
            size=$(wc -c < "$aab")
            echo "OK: $aab ($size bytes)"
            if [ "$size" -lt 1000000 ]; then
              echo "::error::AAB too small (<1MB): $aab"
              exit 1
            fi
          done
          echo "AAB smoke test passed: ${#AABS[@]} AAB(s)"

  # ---------------------------------------------------------------------------
  # Release APK — runs PARALLEL with AAB (no dependency).
  # Triggers: tag push 'v*' OR manual workflow_dispatch. Needs secrets.
  # Quality gate must pass before release jobs start.
  # ---------------------------------------------------------------------------
  release-apk:
    name: Release APK (sideload)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    concurrency:
      group: release-apk
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Cache Gradle build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-1
            ~/.gradle/caches/transforms-3
            android/.gradle
            android/app/build
          key: gradle-build-apk-${{ runner.os }}-${{ hashFiles('android/**/build.gradle*', 'android/**/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: |
            gradle-build-apk-${{ runner.os }}-

      - name: Verify required secrets are present
        env:
          FB_ANDROID_API_KEY: ${{ secrets.FB_ANDROID_API_KEY }}
          FB_ANDROID_APP_ID: ${{ secrets.FB_ANDROID_APP_ID }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          REVENUECAT_SDK_KEY: ${{ secrets.REVENUECAT_SDK_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          VERSION_CODE: ${{ secrets.VERSION_CODE }}
          VERSION_NAME: ${{ secrets.VERSION_NAME }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=()
          for v in FB_ANDROID_API_KEY FB_ANDROID_APP_ID FB_MESSAGING_SENDER_ID \
                   FB_PROJECT_ID FB_STORAGE_BUCKET \
                   GOOGLE_SERVICES_JSON \
                   REVENUECAT_SDK_KEY \
                   ONESIGNAL_APP_ID ONESIGNAL_API_KEY \
                   VERSION_CODE VERSION_NAME \
                   KEYSTORE_BASE64 KEYSTORE_PASSWORD \
                   KEY_ALIAS KEY_PASSWORD; do
            if [ -z "$(eval echo \"\$$v\")" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Add them in GitHub repo → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          python3 -c "import json; json.load(open('android/app/google-services.json'))"

      - name: Build release APK (signed)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          FB_ANDROID_API_KEY: ${{ secrets.FB_ANDROID_API_KEY }}
          FB_ANDROID_APP_ID: ${{ secrets.FB_ANDROID_APP_ID }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          REVENUECAT_SDK_KEY: ${{ secrets.REVENUECAT_SDK_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          VERSION_CODE: ${{ secrets.VERSION_CODE }}
          VERSION_NAME: ${{ secrets.VERSION_NAME }}
        run: |
          # Derive build name from git tag (e.g. v1.0.0-beta5 → 1.0.0-beta5)
          TAG_NAME="${GITHUB_REF#refs/tags/v}"
          if [ -n "$TAG_NAME" ] && [[ "$TAG_NAME" == *.* ]]; then
            BUILD_NAME="$TAG_NAME"
          else
            BUILD_NAME="$VERSION_NAME"
          fi
          BUILD_NUM="${VERSION_CODE:-4}"
          echo "Building: name=$BUILD_NAME, code=$BUILD_NUM"
          flutter build apk --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUM" \
            --dart-define=FB_ANDROID_API_KEY="$FB_ANDROID_API_KEY" \
            --dart-define=FB_ANDROID_APP_ID="$FB_ANDROID_APP_ID" \
            --dart-define=FB_MESSAGING_SENDER_ID="$FB_MESSAGING_SENDER_ID" \
            --dart-define=FB_PROJECT_ID="$FB_PROJECT_ID" \
            --dart-define=FB_STORAGE_BUCKET="$FB_STORAGE_BUCKET" \
            --dart-define=REVENUECAT_SDK_KEY="$REVENUECAT_SDK_KEY" \
            --dart-define=ONESIGNAL_APP_ID="$ONESIGNAL_APP_ID" \
            --dart-define=ONESIGNAL_API_KEY="$ONESIGNAL_API_KEY" \
            --dart-define=VERSION_NAME="$VERSION_NAME" \
            --dart-define=VERSION_CODE="$VERSION_CODE"

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f android/app/keystore.jks
          rm -f android/app/google-services.json

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: refund-radar-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: APK smoke test
        run: |
          set -euo pipefail
          APKS=(build/app/outputs/flutter-apk/*.apk)
          if [ ! -f "${APKS[0]}" ]; then
            echo "::error::No APK artifact found"
            exit 1
          fi
          for apk in "${APKS[@]}"; do
            size=$(wc -c < "$apk")
            echo "OK: $apk ($size bytes)"
            if [ "$size" -lt 1000000 ]; then
              echo "::error::APK too small (<1MB): $apk"
              exit 1
            fi
          done
          echo "APK smoke test passed: ${#APKS[@]} APK(s)"
